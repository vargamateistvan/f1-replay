<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>F1 Replay</title>
  <script>
    // Redirect unknown static paths back to the SPA entry while preserving route/query.
    (function () {
      var pathSegmentsToKeep = 0;
      var l = window.location;
      var base = l.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/');
      var route = l.pathname
        .slice(1)
        .split('/')
        .slice(pathSegmentsToKeep)
        .join('/');
      var query = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';

      l.replace(
        l.protocol +
        '//' +
        l.host +
        base +
        '/?/' +
        route.replace(/&/g, '~and~') +
        query +
        l.hash,
      );
    })();
  </script>
</head>

<body></body>

</html>
