name: Update Circuit Geometry

# Runs on the 1st of every month at 06:00 UTC — after the MultiViewer API
# has had time to publish data for any newly-confirmed calendar additions.
# Also triggerable manually from the Actions tab.
on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-circuits:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch circuit geometry
        run: node scripts/fetch-circuits.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/data/circuit-geometry/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            
            # Get added and modified files
            ADDED=$(git diff --name-only --diff-filter=A src/data/circuit-geometry/ | wc -l)
            MODIFIED=$(git diff --name-only --diff-filter=M src/data/circuit-geometry/ | wc -l)
            TOTAL=$((ADDED + MODIFIED))
            
            echo "added=$ADDED" >> "$GITHUB_OUTPUT"
            echo "modified=$MODIFIED" >> "$GITHUB_OUTPUT"
            echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
            
            # Save file lists for later use
            git diff --name-only --diff-filter=A src/data/circuit-geometry/ > /tmp/added.txt 2>/dev/null || true
            git diff --name-only --diff-filter=M src/data/circuit-geometry/ > /tmp/modified.txt 2>/dev/null || true
          fi

      - name: Commit and push updated geometry
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/circuit-geometry/
          git commit -m "chore(circuits): update baked geometry [skip ci]"
          git push

          # Build summary
          echo "## 🏁 Circuit Geometry Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully updated circuit geometry" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Total files**: ${{ steps.diff.outputs.total }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Added**: ${{ steps.diff.outputs.added }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Modified**: ${{ steps.diff.outputs.modified }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -s /tmp/added.txt ]; then
            echo "### New Circuits 🆕" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat /tmp/added.txt | sed 's|src/data/circuit-geometry/||;s|\.json||' | while read file; do
              CIRCUIT_KEY=$(echo "$file" | cut -d'-' -f1)
              YEAR=$(echo "$file" | cut -d'-' -f2)
              echo "- Circuit \`$CIRCUIT_KEY\` (Year: $YEAR)" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -s /tmp/modified.txt ]; then
            echo "### Updated Circuits 📝" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat /tmp/modified.txt | sed 's|src/data/circuit-geometry/||;s|\.json||' | while read file; do
              CIRCUIT_KEY=$(echo "$file" | cut -d'-' -f1)
              YEAR=$(echo "$file" | cut -d'-' -f2)
              echo "- Circuit \`$CIRCUIT_KEY\` (Year: $YEAR)" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: No changes summary
        if: steps.diff.outputs.changed == 'false'
        run: |
          echo "## 🏁 Circuit Geometry Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ No changes detected in circuit geometry" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The circuit data is up-to-date." >> $GITHUB_STEP_SUMMARY
