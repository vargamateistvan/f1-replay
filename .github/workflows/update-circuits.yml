name: Update Circuit Geometry

# Runs on the 1st of every month at 06:00 UTC — after the MultiViewer API
# has had time to publish data for any newly-confirmed calendar additions.
# Also triggerable manually from the Actions tab.
on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-circuits:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch circuit geometry
        run: node scripts/fetch-circuits.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/data/circuit-geometry/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated geometry
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/circuit-geometry/
          git commit -m "chore(circuits): update baked geometry [skip ci]"
          git push
